<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="800" height="1100" viewBox="0 0 800 1100"><rect width="800" height="1100" fill="#FAFAF8"/><rect x="0" y="0" width="800" height="6" fill="#C6A75E"/><rect x="0" y="8" width="800" height="2" fill="#C6A75E" opacity="0.4"/><rect x="0" y="12" width="800" height="130" fill="white"/><text x="400" y="55" font-family="David, serif" font-size="32" font-weight="bold" fill="#1A2E3C" text-anchor="middle" direction="rtl">ישיבת מיר ירושלים</text><text x="400" y="82" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle" letter-spacing="2">YESHIVAS MIR YERUSHALAYIM</text><line x1="50" y1="100" x2="750" y2="100" stroke="#C6A75E" stroke-width="1"/><line x1="50" y1="104" x2="750" y2="104" stroke="#C6A75E" stroke-width="0.5" opacity="0.5"/><text x="740" y="128" font-family="David, serif" font-size="15" font-weight="bold" fill="#1A2E3C" text-anchor="end" direction="rtl">הרב א.י. פינקל</text><text x="740" y="144" font-family="David, serif" font-size="12" fill="#888" text-anchor="end" direction="rtl">ראש הישיבה</text><text x="60" y="128" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="start">RABBI E.Y. FINKEL – DEAN</text><rect x="0" y="152" width="800" height="1" fill="#E5E1D8"/><text x="540" y="195" font-family="David, serif" font-size="16" fill="#444" text-anchor="middle" direction="rtl">כסלו ה׳תשפ״ג</text><text font-family="David, serif" font-size="15" fill="#222" direction="rtl" text-anchor="middle"><tspan x="540" y="240">מכתב ברכה</tspan><tspan x="540" dy="1.1em"> </tspan><tspan x="540" dy="1.5em">אחז״ל סנהדרין צח, ב שאלו תלמידיו את רבי אלעזר מה יעשה</tspan><tspan x="540" dy="1.5em">אדם וינצל מחבלו של משיח, יעסוק בתורה ובגמ״ח,</tspan><tspan x="540" dy="1.1em"> </tspan><tspan x="540" dy="1.5em">והנה לאחרונה נתעוררו קשיים בפעילות הגמחי״ם ע״י</tspan><tspan x="540" dy="1.5em">השלטונות אשר עי״ז נצרכים המה לסכומים עצמיים מלבד</tspan><tspan x="540" dy="1.5em">הפקדונות, ע״מ להמשיך ולסייע לנצרכים לכך.</tspan><tspan x="540" dy="1.1em"> </tspan><tspan x="540" dy="1.5em">וזוהי הזדמנות נפלאה ליושבי אהל שעיקר עסקם בעמל</tspan><tspan x="540" dy="1.5em">התורה, וחשקה נפשם להשתלם בגמ״ח גם בחלק הגמ״ח</tspan><tspan x="540" dy="1.5em">שבמממונו אשר מחלקיה המרכזיים הוא הלוואת ממון כמש״כ</tspan><tspan x="540" dy="1.5em">מרנא הח״ח באהבת חסד,</tspan></text><line x1="100" y1="900" x2="400" y2="900" stroke="#999" stroke-width="0.8"/><text x="250" y="925" font-family="David, serif" font-size="13" fill="#444" text-anchor="middle" direction="rtl">הרב בנימין פינקל – ראש ישיבת מיר ירושלים</text><rect x="0" y="1092" width="800" height="8" fill="#C6A75E" opacity="0.6"/></svg>