<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="800" height="1100" viewBox="0 0 800 1100"><rect width="800" height="1100" fill="#FAFAF8"/><rect x="0" y="0" width="800" height="6" fill="#C6A75E"/><rect x="0" y="8" width="800" height="2" fill="#C6A75E" opacity="0.4"/><rect x="0" y="12" width="800" height="130" fill="white"/><text x="400" y="55" font-family="David, serif" font-size="32" font-weight="bold" fill="#2D3E40" text-anchor="middle" direction="rtl">ישיבת מיר ירושלים</text><text x="400" y="82" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle" letter-spacing="2">MIRRER YESHIVAH JERUSALEM</text><line x1="50" y1="100" x2="750" y2="100" stroke="#C6A75E" stroke-width="1"/><line x1="50" y1="104" x2="750" y2="104" stroke="#C6A75E" stroke-width="0.5" opacity="0.5"/><text x="740" y="128" font-family="David, serif" font-size="15" font-weight="bold" fill="#2D3E40" text-anchor="end" direction="rtl">הרב יצחק אזרחי</text><text x="740" y="144" font-family="David, serif" font-size="12" fill="#888" text-anchor="end" direction="rtl">מראשי הישיבה</text><text x="60" y="128" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="start">RABBI YITZHAK EZRACHI</text><rect x="0" y="152" width="800" height="1" fill="#E5E1D8"/><text x="540" y="195" font-family="David, serif" font-size="16" fill="#444" text-anchor="middle" direction="rtl">בחסדי ה׳ כ״ו אלול תשפ״ב</text><text font-family="David, serif" font-size="15" fill="#222" direction="rtl" text-anchor="middle"><tspan x="540" y="240">היות שקבעו השלטונות הסדר חדש מול הנמחי״ם שיכולים להמשיך</tspan><tspan x="540" dy="1.5em">ולפעול בנתינת הלוואות, בתנאי שיש בידם הון עצמי מעבר לכספים</tspan><tspan x="540" dy="1.5em">המופקדים על ידי עמך בית ישראל.</tspan><tspan x="540" dy="1.1em"> </tspan><tspan x="540" dy="1.5em">וכמובן מצות גמילות חסדים ע״י הנמחי״ם הינה מיוחדת בחשיבותה,</tspan><tspan x="540" dy="1.5em">שכן מצות גמילות חסד היא בין לעשירים ובין לעניים.</tspan><tspan x="540" dy="1.1em"> </tspan><tspan x="540" dy="1.5em">לכן הנני ממליץ, שכל שבאפשרותו לתרום מהונו כדי לבסס את</tspan><tspan x="540" dy="1.5em">הנגמ״ח ע״י שיהיה תחת ידו הון עצמי, לעשות זאת ושכרו מובטח</tspan><tspan x="540" dy="1.5em">מן השמים.</tspan><tspan x="540" dy="1.1em"> </tspan><tspan x="540" dy="1.5em">הכותב וחותם לכבוד מצוה גדולה זו</tspan></text><line x1="100" y1="900" x2="400" y2="900" stroke="#999" stroke-width="0.8"/><text x="250" y="925" font-family="David, serif" font-size="13" fill="#444" text-anchor="middle" direction="rtl">הרב יצחק אזרחי – ישיבת מיר ירושלים</text><circle cx="160" cy="960" r="45" fill="none" stroke="#888" stroke-width="1.5"/><circle cx="160" cy="960" r="38" fill="none" stroke="#888" stroke-width="0.8"/><text x="160" y="952" font-family="David, serif" font-size="10" fill="#666" text-anchor="middle" direction="rtl">הרב יצחק אזרחי</text><text x="160" y="966" font-family="David, serif" font-size="9" fill="#888" text-anchor="middle" direction="rtl">חותמת רשמית</text><rect x="0" y="1092" width="800" height="8" fill="#C6A75E" opacity="0.6"/></svg>